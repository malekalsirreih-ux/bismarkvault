<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BismarkVault AI | المحلل الذكي</title>
    <style>
        body { background: #060607; color: #f5fef3; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { border: 1px solid #c8a84b; padding: 30px; border-radius: 15px; max-width: 600px; margin: auto; background: #111217; }
        button { background: #c8a84b; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; }
        #result { margin-top: 20px; text-align: right; border-top: 1px solid #c8a84b; padding-top: 10px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#c8a84b">🔐 BismarkVault AI</h2>
        <input type="file" id="fileInput" style="margin-bottom:20px">
        <button onclick="startAnalysis()" id="btn">تحليل الوثيقة الآن</button>
        <div id="result">النتيجة ستظهر هنا...</div>
    </div>

    <script>
        async function startAnalysis() {
            const file = document.getElementById('fileInput').files[0];
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('btn');

            if (!file) return alert("اختر ملفاً أولاً");

            btn.innerText = "جاري التحليل... انتظر قليلاً";
            btn.disabled = true;

            const reader = new FileReader();
            reader.onload = async function() {
                const base64Content = reader.result.split(',')[1]; // تحويل الملف لصيغة يفهمها الذكاء الاصطناعي

                try {
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            fileName: file.name,
                            fileContent: base64Content, // إرسال محتوى الملف كاملاً
                            isImage: file.type.includes('image')
                        })
                    });

                    const data = await response.json();
                    resultDiv.innerText = data.analysis || "خطأ: " + data.error;
                } catch (e) {
                    resultDiv.innerText = "حدث خطأ في الاتصال بالسيرفر.";
                } finally {
                    btn.innerText = "تحليل الوثيقة الآن";
                    btn.disabled = false;
                }
            };
            
            // قراءة الملف كـ DataURL ليدعم الصور والنصوص معاً
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
