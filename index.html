<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BismarkVault</title>

<style>
:root {
  --gold: #C8A84B;
  --bg: #050403;
  --card: #1E1A16;
  --text: #D8C8A8;
}

body {
  margin:0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}

/* NAV */
nav {
  display:flex;
  justify-content:space-between;
  padding:20px;
  border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo {
  font-weight:bold;
  color: var(--gold);
}

/* HERO */
.hero {
  text-align:center;
  padding:100px 20px;
}

.hero h1 {
  font-size:48px;
  color: var(--gold);
}

.btn {
  margin-top:20px;
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background: var(--gold);
  color:black;
  cursor:pointer;
}

/* VAULT */
#vault {
  display:none;
  max-width:600px;
  margin:40px auto;
  padding:20px;
  background: var(--card);
  border-radius:10px;
}

input {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:black;
  color:white;
  border:1px solid #333;
}

.file {
  margin-top:10px;
  padding:10px;
  background:black;
}
</style>
</head>

<body>

<nav>
  <div class="logo">BismarkVault</div>
  <button onclick="showVault()">Open Vault</button>
</nav>

<section class="hero">
  <h1>BismarkVault</h1>
  <p>AI Document Analyzer</p>
  <button class="btn" onclick="showVault()">Start</button>
</section>

<div id="vault">
  <h3>Secure Vault</h3>

  <input type="file" id="fileInput">
  <div id="files"></div>

</div>

<script>

function showVault(){
  document.querySelector('.hero').style.display='none';
  document.getElementById('vault').style.display='block';
}

document.getElementById('fileInput').addEventListener('change', function(e){
  const file = e.target.files[0];
  if(!file) return;

  const div = document.createElement('div');
  div.className='file';
  div.textContent = file.name;

  document.getElementById('files').appendChild(div);
});

</script>

</body>
</html>
