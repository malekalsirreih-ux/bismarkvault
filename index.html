<<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BismarkVault | الخزنة الآمنة</title>
    <style>
        :root { --gold: #C8A84B; --bg: #0d0d0d; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: rgba(255,255,255,0.03); padding: 40px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 360px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { color: var(--gold); margin-bottom: 5px; font-size: 24px; }
        p { opacity: 0.6; font-size: 14px; margin-bottom: 25px; }
        .input-box { position: relative; width: 100%; }
        input { width: 100%; padding: 14px; border-radius: 10px; border: 1px solid #333; background: #000; color: white; font-size: 16px; box-sizing: border-box; }
        input:focus { border-color: var(--gold); outline: none; }
        .toggle { position: absolute; left: 10px; top: 12px; cursor: pointer; filter: grayscale(1); opacity: 0.5; }
        button { width: 100%; padding: 14px; background: var(--gold); border: none; border-radius: 10px; color: black; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #e0bc54; transform: translateY(-2px); }
    </style>
</head>
<body>

<div class="login-card">
    <h1>BismarkVault</h1>
    <p>مرحباً مالك، أدخل مفتاحك الخاص</p>
    
    <div class="input-box">
        <input type="password" id="passInput" placeholder="كلمة السر">
        <span class="toggle" onclick="togglePass()">👁️</span>
    </div>

    <button onclick="checkAuth()">دخول آمن</button>
</div>

<script>
    // كلمة السر التي اخترتها
    const MY_SECRET = "Malek,ser1984";

    function checkAuth() {
        const val = document.getElementById('passInput').value;
        if (val === MY_SECRET) {
            alert("✅ أهلاً بك يا مالك! جاري فتح الخزنة...");
            // هنا تضع رابط صفحتك التالية: window.location.href = "vault.html";
        } else {
            alert("❌ كلمة السر غير صحيحة، حاول مجدداً.");
        }
    }

    function togglePass() {
        const p = document.getElementById('passInput');
        p.type = p.type === 'password' ? 'text' : 'password';
    }
</script>

</body>
</html>
