<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BismarkVault AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0b;
      color: white;
      text-align: center;
      padding: 50px 20px;
    }

    h1 {
      color: gold;
      font-size: 50px;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      font-size: 18px;
    }

    textarea {
      width: 80%;
      max-width: 800px;
      height: 220px;
      background: #111;
      color: white;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 15px;
      font-size: 16px;
      margin-top: 20px;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .gold {
      background: gold;
      color: black;
    }

    .white {
      background: white;
      color: black;
    }

    .result {
      width: 80%;
      max-width: 800px;
      margin: 30px auto;
      background: #151515;
      padding: 20px;
      border-radius: 10px;
      text-align: right;
      border-right: 5px solid gold;
      line-height: 2;
    }
  </style>
</head>

<body>

  <h1>BISMARKVAULT AI</h1>
  <p>تحليل احترافي للمستندات والبيانات المالية</p>

  <textarea id="input" placeholder="أدخل النص هنا..."></textarea>

  <br>

  <button class="gold" onclick="audit()">🔍 تدقيق</button>
  <button class="white" onclick="finance()">📊 محاسبة</button>

  <div id="output" class="result">بانتظار التحليل...</div>

  <script>
    function audit() {
      const text = document.getElementById("input").value;
      if (!text) {
        alert("أدخل نص أولاً");
        return;
      }

      document.getElementById("output").innerText =
        "✅ تم التدقيق\n\n" +
        "النص: " + text + "\n\n" +
        "لا توجد مشاكل واضحة حالياً.\n\n" +
        "ننصح بمراجعة بشرية.";
    }

    function finance() {
      const text = document.getElementById("input").value;
      if (!text) {
        alert("أدخل نص أولاً");
        return;
      }

      document.getElementById("output").innerText =
        "📊 تحليل مالي\n\n" +
        "تم العثور على بيانات مالية محتملة.\n\n" +
        "يرجى التحقق من الضرائب والمواعيد.";
    }
  </script>

</body>
</html>
