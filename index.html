
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BismarkVault</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  background: radial-gradient(circle at top, #1b1b1b 0%, #0a0a0a 60%, #050505 100%);
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

/* LOGO */
.logo {
  width: 160px;
  margin-top: 40px;
  margin-bottom: 10px;
  border-radius: 20px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

/* TITLE */
h1 {
  color: #ffd700;
  font-size: 38px;
  margin-bottom: 20px;
  text-shadow: 0 0 15px rgba(255,215,0,0.3);
}

/* BOX */
.container {
  background: rgba(255,255,255,0.05);
  width: 320px;
  margin: auto;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(255,215,0,0.2);
}

/* INPUT */
input {
  width: 90%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-bottom: 10px;
}

/* BUTTONS */
button {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  background: gold;
  cursor: pointer;
  font-weight: bold;
}

button:hover {
  background: orange;
}

/* FILE BOX */
.file-box {
  background: rgba(255,255,255,0.08);
  margin-top: 10px;
  padding: 10px;
  border-radius: 10px;
}

/* DELETE BUTTON */
.delete-btn {
  background: red;
  color: white;
  margin-top: 5px;
}

/* LOGOUT */
.logout-btn {
  background: #444;
  color: white;
}
</style>

</head>

<body>

<img src="logo.png" class="logo">
<h1>BismarkVault</h1>

<!-- LOGIN -->
<div class="container" id="login">
  <input type="password" id="password" placeholder="Enter Password">
  <br>
  <button onclick="login()">Unlock</button>
  <p>Password: 1234</p>
</div>

<!-- VAULT -->
<div class="container" id="vault" style="display:none;">

  <h3>Your Files</h3>

  <input type="file" id="fileInput" multiple onchange="saveFiles(event)">
  <br><br>

  <button onclick="clearFiles()" class="delete-btn">Delete All</button>
  <button onclick="logout()" class="logout-btn">Logout</button>

  <div id="files"></div>

</div>

<script>
const STORAGE_KEY = "vault_files";

// LOGIN
function login() {
  const pass = document.getElementById("password").value;

  if (pass === "1234") {
    document.getElementById("login").style.display = "none";
    document.getElementById("vault").style.display = "block";
    displayFiles();
  } else {
    alert("Wrong Password ❌");
  }
}

// LOGOUT
function logout() {
  document.getElementById("login").style.display = "block";
  document.getElementById("vault").style.display = "none";
}

// SAVE FILES
function saveFiles(event) {
  let files = event.target.files;
  let saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

  for (let i = 0; i < files.length; i++) {
    let file = files[i];

    saved.push({
      name: file.name,
      size: file.size,
      type: file.type
    });
  }

  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  displayFiles();
}

// DISPLAY FILES
function displayFiles() {
  let box = document.getElementById("files");
  let saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

  box.innerHTML = "";

  if (saved.length === 0) {
    box.innerHTML = "<p>No files saved yet.</p>";
    return;
  }

  saved.forEach((file, index) => {
    let div = document.createElement("div");
    div.className = "file-box";

    div.innerHTML = `
      <b>${file.name}</b><br>
      Size: ${Math.round(file.size / 1024)} KB<br>
      Type: ${file.type}<br>
      <button class="delete-btn" onclick="deleteFile(${index})">Delete</button>
    `;

    box.appendChild(div);
  });
}

// DELETE FILE
function deleteFile(index) {
  let saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
  saved.splice(index, 1);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
  displayFiles();
}

// DELETE ALL
function clearFiles() {
  if (!confirm("Are you sure?")) return;
  localStorage.removeItem(STORAGE_KEY);
  displayFiles();
}
</script>

</body>
</html>
