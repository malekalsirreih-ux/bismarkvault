
  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BismarkVault 🔐</title>

<style>
body {
    background: #0a0a0a;
    color: #fff;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
}

h1 {
    color: gold;
    text-align: center;
}

.container {
    text-align: center;
    margin-top: 40px;
}

input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin: 10px;
}

button {
    padding: 12px 25px;
    background: gold;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

#vault {
    display: none;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill,minmax(200px,1fr));
    gap: 15px;
    margin-top: 30px;
}

.card {
    background: #111;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #333;
}

.category {
    font-size: 12px;
    color: gold;
}

.search {
    text-align: center;
    margin-top: 20px;
}
</style>
</head>

<body>

<h1>BismarkVault 🔐</h1>

<div class="container" id="login">
    <input type="password" id="password" placeholder="Enter Password">
    <br>
    <button onclick="login()">Unlock</button>
</div>

<div id="vault">

    <div class="search">
        <input type="text" id="search" placeholder="Search files..." oninput="searchFiles()">
    </div>

    <div class="container">
        <input type="file" id="fileInput" multiple onchange="uploadFiles()">
    </div>

    <div class="grid" id="fileGrid"></div>

</div>

<script>
let files = [];

function login(){
    const pass = document.getElementById("password").value;
    if(pass === "1234"){
        document.getElementById("login").style.display = "none";
        document.getElementById("vault").style.display = "block";
    } else {
        alert("Wrong Password ❌");
    }
}

function classify(name){
    name = name.toLowerCase();

    if(name.includes("invoice") || name.includes("bank")) return "Financial";
    if(name.includes("medical") || name.includes("doctor")) return "Medical";
    if(name.includes("contract") || name.includes("law")) return "Legal";

    return "General";
}

function uploadFiles(){
    const input = document.getElementById("fileInput");

    for(let file of input.files){
        files.push({
            name: file.name,
            category: classify(file.name)
        });
    }

    render();
}

function render(){
    const grid = document.getElementById("fileGrid");
    grid.innerHTML = "";

    files.forEach(f => {
        grid.innerHTML += `
        <div class="card">
            <div>${f.name}</div>
            <div class="category">${f.category}</div>
        </div>`;
    });
}

function searchFiles(){
    const q = document.getElementById("search").value.toLowerCase();
    const grid = document.getElementById("fileGrid");

    grid.innerHTML = "";

    files.filter(f => f.name.toLowerCase().includes(q))
    .forEach(f => {
        grid.innerHTML += `
        <div class="card">
            <div>${f.name}</div>
            <div class="category">${f.category}</div>
        </div>`;
    });
}
</script>

</body>
</html>
