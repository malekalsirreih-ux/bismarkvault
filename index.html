<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BismarkVault AI</title>

<style>
body {
  background: #0b0b0b;
  color: gold;
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 50px;
}

h1 {
  font-size: 32px;
}

input {
  width: 300px;
  padding: 10px;
  margin-top: 20px;
}

button {
  padding: 12px 25px;
  background: gold;
  color: black;
  border: none;
  margin-top: 15px;
  cursor: pointer;
  font-weight: bold;
}

#result {
  margin-top: 25px;
  color: white;
  white-space: pre-wrap;
}
</style>

</head>

<body>

<h1>🔐 BismarkVault AI</h1>

<input id="api" placeholder="Paste API Key هنا"><br>

<button onclick="askAI()">Analyze</button>

<div id="result"></div>

<script>
async function askAI() {
  const key = document.getElementById("api").value;
  const result = document.getElementById("result");

  if (!key) {
    result.innerHTML = "❌ أدخل API Key أولاً";
    return;
  }

  result.innerHTML = "⏳ جاري التحليل...";

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": key,
        "anthropic-version": "2023-06-01"
      },
      body: JSON.stringify({
        model: "claude-3-haiku-20240307",
        max_tokens: 300,
        messages: [
          {
            role: "user",
            content: "Analyze this file professionally and give clear suggestions"
          }
        ]
      })
    });

    const data = await res.json();

    if (data.error) {
      result.innerHTML = "❌ Error: " + data.error.message;
      return;
    }

    result.innerHTML = data.content?.[0]?.text || "⚠️ لا يوجد رد";

  } catch (e) {
    result.innerHTML = "❌ مشكلة في الاتصال";
  }
}
</script>

</body>
</html>
