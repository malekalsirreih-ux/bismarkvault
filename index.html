<<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BismarkVault</title>

<meta name="description" content="BismarkVault AI Document Analyzer">
<meta name="theme-color" content="#C8A84B">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Cairo', sans-serif;
  background: #0b0b0b;
  color: #fff;
}

header {
  padding: 20px;
  text-align: center;
  background: #111;
  border-bottom: 1px solid #C8A84B;
}

h1 {
  color: #C8A84B;
}

nav a {
  color: #ccc;
  margin: 0 10px;
  text-decoration: none;
}

nav a:hover {
  color: #C8A84B;
}

.container {
  padding: 40px;
  text-align: center;
}

.btn {
  background: #C8A84B;
  color: #000;
  padding: 12px 20px;
  border: none;
  cursor: pointer;
}

.upload-box {
  margin-top: 30px;
  border: 2px dashed #C8A84B;
  padding: 30px;
}

.result {
  margin-top: 20px;
  background: #111;
  padding: 20px;
  border-radius: 10px;
}

footer {
  text-align: center;
  padding: 20px;
  border-top: 1px solid #333;
  margin-top: 50px;
}
</style>
</head>
<body><header>
<h1>BismarkVault</h1>
<nav>
<a href="#">الرئيسية</a>
<a href="#">Vault</a>
<a href="#">AI</a>
</nav>
</header>

<section class="container">
<h2>محلل الوثائق الذكي</h2>
<p>رفع ملفاتك وتحليلها باستخدام الذكاء الاصطناعي</p>

<div class="upload-box">
<input type="file" id="fileInput">
<br><br>
<button class="btn" onclick="analyzeFile()">Analyze with AI</button>
</div>

<div id="output" class="result" style="display:none;"></div>
</section><script>
function analyzeFile() {
  const file = document.getElementById("fileInput").files[0];

  if (!file) {
    alert("يرجى اختيار ملف أولاً");
    return;
  }

  const output = document.getElementById("output");
  output.style.display = "block";
  output.innerHTML = "⏳ جاري التحليل...";

  setTimeout(() => {
    simulateAI(file.name);
  }, 1500);
}

function simulateAI(filename) {
  const text = `
📄 اسم الملف: ${filename}

🔍 التحليل:
- تم اكتشاف محتوى قانوني
- لا توجد مخاطر DSGVO
- اللغة: ألمانية

💡 توصيات:
- لا حاجة لاتخاذ إجراء
- الملف آمن للاستخدام
  `;

  typeEffect(text);
}

function typeEffect(text) {
  const output = document.getElementById("output");
  output.innerHTML = "";
  let i = 0;

  function typing() {
    if (i < text.length) {
      output.innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 20);
    }
  }

  typing();
}
</script><footer>
<p>© 2026 BismarkVault — AI Powered</p>
</footer>

</body>
</html>
