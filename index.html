
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BismarkVault 🔐</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      background: #0a0a0a;
      color: #ffffff;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    h1 {
      color: gold;
      margin-top: 30px;
      margin-bottom: 10px;
    }

    h2 {
      margin-bottom: 20px;
    }

    .container {
      margin-top: 40px;
    }

    input[type="password"],
    input[type="file"] {
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin: 10px;
      width: 260px;
      font-size: 16px;
    }

    button {
      padding: 12px 25px;
      background: gold;
      color: black;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      opacity: 0.9;
    }

    .hint {
      color: #bbbbbb;
      font-size: 14px;
      margin-top: 10px;
    }

    .file-box {
      margin-top: 30px;
      max-width: 650px;
      margin-left: auto;
      margin-right: auto;
      text-align: left;
    }

    .file-item {
      background: #1a1a1a;
      border: 1px solid #444;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      color: white;
      box-shadow: 0 0 10px rgba(255, 215, 0, 0.08);
    }

    .file-name {
      font-weight: bold;
      margin-bottom: 6px;
      word-break: break-word;
    }

    .file-meta {
      color: #cccccc;
      font-size: 14px;
      line-height: 1.6;
    }

    .empty {
      color: #aaaaaa;
      text-align: center;
      margin-top: 20px;
    }

    .top-actions {
      margin-top: 15px;
      margin-bottom: 10px;
    }

    .danger-btn {
      background: #c62828;
      color: white;
      margin-left: 8px;
    }

    .logout-btn {
      background: #444;
      color: white;
      margin-left: 8px;
    }
  </style>
</head>
<body>

 <img src="logo.png" style="width:120px;">
<h1>BismarkVault</h1>

  <!-- LOGIN -->
  <div class="container" id="login">
    <input type="password" id="password" placeholder="Enter Password" />
    <br />
    <button onclick="login()">Unlock</button>
    <p class="hint">Password: 1234</p>
  </div>

  <!-- VAULT -->
  <div class="container" id="vault" style="display: none;">
    <h2>Your Files</h2>

    <input type="file" id="fileInput" multiple onchange="showFiles(event)" />

    <div class="top-actions">
      <button onclick="clearFiles()" class="danger-btn">Delete All</button>
      <button onclick="logout()" class="logout-btn">Logout</button>
    </div>

    <div class="file-box" id="files"></div>
  </div>

  <script>
    const VAULT_PASSWORD = "1234";
    const STORAGE_KEY = "bismarkvault_files";

    function login() {
      const pass = document.getElementById("password").value.trim();

      if (pass === VAULT_PASSWORD) {
        document.getElementById("login").style.display = "none";
        document.getElementById("vault").style.display = "block";
        displayFiles();
      } else {
        alert("Wrong Password ❌");
      }
    }

    function logout() {
      document.getElementById("vault").style.display = "none";
      document.getElementById("login").style.display = "block";
      document.getElementById("password").value = "";
    }

    function showFiles(event) {
      const files = event.target.files;
      let savedFiles = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

      for (let i = 0; i < files.length; i++) {
        const file = files[i];

        savedFiles.push({
          name: file.name,
          size: file.size,
          type: file.type || "Unknown"
        });
      }

      localStorage.setItem(STORAGE_KEY, JSON.stringify(savedFiles));
      displayFiles();

      document.getElementById("fileInput").value = "";
    }

    function displayFiles() {
      const fileBox = document.getElementById("files");
      const savedFiles = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

      fileBox.innerHTML = "";

      if (savedFiles.length === 0) {
        fileBox.innerHTML = '<p class="empty">No files saved yet.</p>';
        return;
      }

      savedFiles.forEach((file, index) => {
        const div = document.createElement("div");
        div.className = "file-item";

        div.innerHTML = `
          <div class="file-name">📄 ${file.name}</div>
          <div class="file-meta">
            Size: ${Math.round(file.size / 1024)} KB<br>
            Type: ${file.type}
          </div>
          <br>
          <button onclick="deleteFile(${index})" class="danger-btn">Delete</button>
        `;

        fileBox.appendChild(div);
      });
    }

    function deleteFile(index) {
      let savedFiles = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      savedFiles.splice(index, 1);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(savedFiles));
      displayFiles();
    }

    function clearFiles() {
      const confirmDelete = confirm("Are you sure you want to delete all files?");
      if (!confirmDelete) return;

      localStorage.removeItem(STORAGE_KEY);
      displayFiles();
    }
  </script>

</body>
</html>
