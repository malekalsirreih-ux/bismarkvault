
 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BismarkVault 🔐</title>

<style>
body {
    background: #0a0a0a;
    color: #fff;
    font-family: Arial;
    text-align: center;
    padding: 20px;
}

h1 {
    color: gold;
}

.container {
    margin-top: 50px;
}

input {
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin: 10px;
    width: 220px;
}

button {
    padding: 12px 25px;
    background: gold;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

.file-box {
    margin-top: 30px;
}
</style>
</head>

<body>

<h1>🔐 BismarkVault</h1>

<!-- LOGIN -->
<div class="container" id="login">
    <input type="password" id="password" placeholder="Enter Password">
    <br>
    <button onclick="login()">Unlock</button>
</div>

<!-- VAULT -->
<div class="container" id="vault" style="display:none;">
    <h2>Your Files</h2>
    <input type="file" multiple>
    <div class="file-box" id="files"></div>
</div>

<script>
function login(){
    const pass = document.getElementById("password").value;

    if(pass === "1234"){
        document.getElementById("login").style.display = "none";
        document.getElementById("vault").style.display = "block";
    } else {
        alert("Wrong Password ❌");
    }
}
</script>

</body>
</html>
