<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>BismarkVault AI</title>
    <style>
        body { background: #060607; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
        .box { border: 2px solid #c8a84b; padding: 30px; border-radius: 15px; max-width: 500px; margin: auto; background: #111217; }
        button { background: #c8a84b; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; border-radius: 5px; }
        #result { margin-top: 20px; text-align: right; white-space: pre-wrap; color: #f5fef3; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#c8a84b">🔐 BismarkVault AI</h2>
        <input type="file" id="uploadFile" style="margin-bottom: 20px;">
        <button onclick="start()">تحليل الوثيقة الآن</button>
        <div id="result">النتيجة ستظهر هنا...</div>
    </div>

    <script>
        async function start() {
            const file = document.getElementById('uploadFile').files[0];
            if (!file) return alert("اختر ملفاً أولاً");

            document.getElementById('result').innerText = "جاري التحليل... يرجى الانتظار";
            
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const response = await fetch('/api/analyze', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            fileName: file.name, 
                            fileContent: e.target.result.substring(0, 4000) 
                        })
                    });
                    const data = await response.json();
                    document.getElementById('result').innerText = data.analysis || "حدث خطأ في الرد";
                } catch (err) {
                    document.getElementById('result').innerText = "مشكلة في الاتصال بالخادم. تأكد من حذف الملف الزائد من مجلد api.";
                }
            };
            reader.readAsText(file);
        }
    </script>
</body>
</html>
